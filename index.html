<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Reserve a place in the first Poster Valley print run and receive an invoice and payment link when production is ready."
    />
    <meta property="og:title" content="Poster Valley First Print Reservations" />
    <meta
      property="og:description"
      content="A temporary launch site for the first curated Poster Valley Designs."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <title>Poster Valley First Print Reservations</title>
  </head>
  <body>
    <form name="reservation" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="reservation" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="country" />
      <input name="poster" />
      <input name="format" />
      <input name="quantity" />
      <input name="shipping-address" />
      <input name="postal-code" />
      <input name="city" />
      <input name="invoice-name" />
      <textarea name="note"></textarea>
      <input name="consent" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
